<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Chai Utility Playground</title>
	</head>
	<body class="chai-p-28 chai-bg-whitesmoke">
		<main class="chai-p-24 chai-border-1 chai-border-lightgray chai-rounded-18 chai-bg-white chai-maxw-980">
			<h1 class="chai-text-34 chai-m-0 chai-mb-8">Chai Utility Playground</h1>
			<p class="chai-m-0 chai-mb-14 chai-text-slategray">Click preset classes, edit manually, then press Run to apply styles using DOM conversion.</p>

			<div class="chip-list chai-flex chai-wrap chai-gap-8 chai-mb-18">
				<button class="chip chai-p-8 chai-bg-white chai-border-1 chai-border-lightgray chai-rounded-999 chai-text-13" data-class="chai-p-20">chai-p-20</button>
				<button class="chip chai-p-8 chai-bg-white chai-border-1 chai-border-lightgray chai-rounded-999 chai-text-13" data-class="chai-m-10">chai-m-10</button>
				<button class="chip chai-p-8 chai-bg-white chai-border-1 chai-border-lightgray chai-rounded-999 chai-text-13" data-class="chai-bg-lightblue">chai-bg-lightblue</button>
				<button class="chip chai-p-8 chai-bg-white chai-border-1 chai-border-lightgray chai-rounded-999 chai-text-13" data-class="chai-text-white">chai-text-white</button>
				<button class="chip chai-p-8 chai-bg-white chai-border-1 chai-border-lightgray chai-rounded-999 chai-text-13" data-class="chai-text-center">chai-text-center</button>
				<button class="chip chai-p-8 chai-bg-white chai-border-1 chai-border-lightgray chai-rounded-999 chai-text-13" data-class="chai-text-22">chai-text-22</button>
				<button class="chip chai-p-8 chai-bg-white chai-border-1 chai-border-lightgray chai-rounded-999 chai-text-13" data-class="chai-border-2">chai-border-2</button>
				<button class="chip chai-p-8 chai-bg-white chai-border-1 chai-border-lightgray chai-rounded-999 chai-text-13" data-class="chai-border-black">chai-border-black</button>
				<button class="chip chai-p-8 chai-bg-white chai-border-1 chai-border-lightgray chai-rounded-999 chai-text-13" data-class="chai-rounded-12">chai-rounded-12</button>
				<button class="chip chai-p-8 chai-bg-white chai-border-1 chai-border-lightgray chai-rounded-999 chai-text-13" data-class="chai-w-320">chai-w-320</button>
				<button class="chip chai-p-8 chai-bg-white chai-border-1 chai-border-lightgray chai-rounded-999 chai-text-13" data-class="chai-h-140">chai-h-140</button>
			</div>

			<input
				class="chai-p-12 chai-text-14 chai-rounded-10 chai-border-1 chai-border-lightgray chai-w-500"
				type="text"
				id="classInput"
				placeholder="Example: chai-p-10 chai-bg-teal chai-text-white chai-rounded-10"
			/>

			<div class="controls chai-flex chai-gap-10 chai-mt-12">
				<button id="runButton" class="chai-p-10 chai-bg-dodgerblue chai-text-white chai-rounded-10 chai-border-0">Run Conversion</button>
				<button id="resetButton" class="chai-p-10 chai-bg-gainsboro chai-text-black chai-rounded-10 chai-border-0">Reset</button>
			</div>

			<p class="chai-mt-22 chai-mb-8 chai-font-bold">Preview</p>
			<div id="previewBox" class="preview-box chai-inline-block chai-w-320 chai-h-140 chai-p-14 chai-border-1 chai-border-lightsteelblue chai-rounded-10 chai-bg-aliceblue">Your converted styles appear here.</div>
			<p id="output" class="output chai-mt-12 chai-text-14 chai-text-slategray">Tip: try adding chai-bg-coral and chai-text-white.</p>
		</main>

		<script src="./style.js"></script>
		<script src="./playground.js"></script>
	</body>
</html>
